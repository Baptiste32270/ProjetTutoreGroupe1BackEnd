# 1. Configuration de la base de données H2 en mémoire
spring.datasource.url=jdbc:h2:mem:isis_archivage
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Activer la console H2 dans le navigateur (pour voir tes tables facilement)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 3. Configuration de JPA / Hibernate
# "update" permet de créer/mettre à jour les tables automatiquement à partir de tes classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 4. Afficher les requêtes SQL dans la console (très utile pour débugger)
spring.jpa.show-sql=true